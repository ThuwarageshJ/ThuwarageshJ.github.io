<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - Your Name</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">Your Name</h1>
                <p class="tagline">Developer • Creator • Thinker</p>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="navigation">
            <ul class="nav-tabs">
                <li class="nav-item" data-tab="about">
                    <i class="fas fa-user"></i>
                    <span>About Me</span>
                </li>
                <li class="nav-item active" data-tab="blogs">
                    <i class="fas fa-blog"></i>
                    <span>Blogs</span>
                </li>
                <li class="nav-item" data-tab="ideas">
                    <i class="fas fa-lightbulb"></i>
                    <span>Random Ideas</span>
                </li>
                <li class="nav-item" data-tab="projects">
                    <i class="fas fa-code"></i>
                    <span>Projects</span>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                <!-- Back to Blogs Button -->
                <div class="back-button">
                    <a href="index.html#blogs" class="back-link">
                        <i class="fas fa-arrow-left"></i>
                        Back to All Posts
                    </a>
                </div>

                <!-- Blog Post Content -->
                <article class="blog-post">
                    <header class="post-header">
                        <div class="post-icon">
                            <i id="post-icon" class="fas fa-code"></i>
                        </div>
                        <h1 id="post-title">Loading...</h1>
                        <div class="post-meta">
                            <span id="post-date" class="post-date">Loading...</span>
                            <div id="post-tags" class="post-tags">
                                <!-- Tags will be loaded here -->
                            </div>
                        </div>
                    </header>

                    <div id="post-content" class="post-content">
                        <!-- Blog content will be loaded here -->
                        <div class="loading">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Loading blog post...</p>
                        </div>
                    </div>

                    <!-- Related Posts -->
                    <section class="related-posts">
                        <h3>More Posts</h3>
                        <div id="related-posts-grid" class="related-posts-grid">
                            <!-- Related posts will be loaded here -->
                        </div>
                    </section>
                </article>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <div class="social-links">
                    <a href="#" class="social-link"><i class="fab fa-github"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-linkedin"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="social-link"><i class="fas fa-envelope"></i></a>
                </div>
                <p>&copy; 2024 Your Name. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="blog-posts.js"></script>
    <script src="blog-post.js"></script>
</body>
</html>
